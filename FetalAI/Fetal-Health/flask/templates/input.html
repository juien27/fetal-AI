<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inspect | FETALHEALTH.</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="inner-body">
    <main class="page-frame inner-page">
        <header class="site-header site-header-pink">
            <a class="brand" href="{{ url_for('home') }}">FETALHEALTH.</a>
            <nav class="main-nav">
                <a href="{{ url_for('home') }}">Home</a>
                <a href="{{ url_for('about') }}">Check here</a>
                <a href="{{ url_for('contact') }}">Contact</a>
            </nav>
            <a class="action-button" href="{{ url_for('input_page') }}">Inspect</a>
        </header>

        <section class="inspect-section">
            <h1>FetalHealth</h1>
            <form class="inspect-form" action="{{ url_for('predict') }}" method="post">
                {% for field in feature_fields %}
                    <label class="field-card">
                        <span>{{ field }}</span>
                        <input
                            type="number"
                            step="any"
                            name="{{ field }}"
                            placeholder="0"
                            required
                        >
                    </label>
                {% endfor %}
                <button class="submit-button" type="submit">submit</button>
            </form>
        </section>
    </main>
</body>
</html>
